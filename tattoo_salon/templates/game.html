{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tattoo Salon | Interactive Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff0055;
            --accent: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        #unity-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #unity-canvas {
            width: 100%; height: 100%;
            display: block;
        }

        /* Экран загрузки */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.6s ease;
        }

        .loader-card {
            text-align: center;
            width: 300px;
        }

        .loader-text {
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .progress-bar-bg {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-bar-full {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.3s ease;
        }

        /* Кнопки управления */
        .game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 50;
            pointer-events: none;
        }

        .btn-ui {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-ui:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
        }

        #fullscreen-btn { cursor: pointer; }
    </style>
</head>
<body>

    <div id="unity-container">
        <!-- Верхняя панель -->
        <div class="game-ui">
            <a href="{% url 'home' %}" class="btn-ui">
                <i class="fas fa-arrow-left"></i> В САЛОН
            </a>
            <div id="fullscreen-btn" class="btn-ui">
                <i class="fas fa-expand"></i> НА ВЕСЬ ЭКРАН
            </div>
        </div>

        <!-- Загрузчик -->
        <div id="loading-overlay">
            <div class="loader-card">
                <div class="loader-text">Studio Loading</div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-full"></div>
                </div>
            </div>
        </div>

        <canvas id="unity-canvas"></canvas>
    </div>

    <script src="{% static 'tattoo_salon/game/Build/GL.loader.js' %}"></script>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const overlay = document.querySelector("#loading-overlay");
      const progressBar = document.querySelector("#progress-bar-full");
      const fsBtn = document.querySelector("#fullscreen-btn");

      const config = {
        dataUrl: "{% static 'tattoo_salon/game/Build/GL.data' %}",
        frameworkUrl: "{% static 'tattoo_salon/game/Build/GL.framework.js' %}",
        codeUrl: "{% static 'tattoo_salon/game/Build/GL.wasm' %}",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "TattooSalon",
        productName: "Tattoo Game",
        productVersion: "1.0",
        devicePixelRatio: Math.min(window.devicePixelRatio, 2), // Оптимизация четкости
      };

      let gameInstance = null;

      createUnityInstance(canvas, config, (progress) => {
        progressBar.style.width = (100 * progress) + "%";
      }).then((instance) => {
        gameInstance = instance;
        overlay.style.opacity = "0";
        setTimeout(() => overlay.style.display = "none", 600);
      }).catch(alert);

      fsBtn.onclick = () => {
          if (gameInstance) gameInstance.SetFullscreen(1);
      };
    </script>
</body>
</html>
